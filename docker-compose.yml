services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: mcg_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ──────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    ports:
      - "5294:5294"    # HTTP  (matches launchSettings.json http profile)
      - "7229:7229"    # HTTPS (matches launchSettings.json https profile)
    environment:
      # NOT "Development": this image is built with `dotnet publish -c Release` (matching
      # the real staging/prod build), and Auth.cs has a compile-time `#if RELEASE` branch
      # whose constructor requires EmailPublisherService — which is only registered in DI
      # when the runtime environment is non-Development. Release build + Development
      # environment is a combination the app was never designed to support; every other
      # local/dev workflow pairs Debug-build with Development, or Release-build with a
      # real environment. "Production" here just means "fully provisioned, real build" —
      # the one differing bit (local CORS origin) is added explicitly below.
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "https://+:7229;http://+:5294"
      # appsettings.json's Cors:AllowedOrigins only has the real prod/staging domains —
      # add the local Docker client as a third allowed origin.
      Cors__AllowedOrigins__2: http://localhost:5080
      # Dev certificate mounted from host — generated with:
      #   dotnet dev-certs https -ep "$HOME/.aspnet/https/aspnetapp.pfx" -p mcg_dev_cert_2026 --trust
      # (Windows/PowerShell: use $env:USERPROFILE instead of $HOME below and above)
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: mcg_dev_cert_2026
      # Secrets — all sourced from .env (gitignored), see .env.example
      App__Key: ${APP_KEY:?set APP_KEY in .env}
      ExternalApiKeys__ValidKeys__0: ${EXTERNAL_API_KEY:-}
      # Brevo email — optional; leave blank in .env to skip
      # (Makulli = Brevo API key; SMTP:* = Brevo's SMTP relay, used by SmtpOption)
      Brevo__Makulli: ${BREVO_MAKULLI:-}
      SMTP__Host: smtp-relay.brevo.com
      SMTP__Port: 587
      SMTP__Email: ${BREVO_EMAIL:-}
      SMTP__Password: ${BREVO_SMTP_KEY:-}
      # Override the Production connection string to point at the db container
      ConnectionStrings__Production: "Host=db;port=5432;Username=postgres;Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env};Database=mcg_db"
      # Override RabbitMQ host to point at the rabbitmq container
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:?set RABBITMQ_USER in .env}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}
      # File storage inside the container
      FileStorage__UploadPath: /var/www/uploads
      FileStorage__PublicUrl: /uploads
    volumes:
      - uploads_data:/var/www/uploads
      - ${HOME}/.aspnet/https:/https:ro   # dev cert mounted read-only
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Client (Blazor WASM, served as static files via nginx) ─────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    ports:
      - "5080:8080"   # http://localhost:5080 (5000 is taken by macOS AirPlay Receiver on this host)
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
